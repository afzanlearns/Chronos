<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focus Mode Active</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
    }
    .container {
      max-width: 500px;
      padding: 40px;
    }
    .icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #e94560;
    }
    .message {
      font-size: 16px;
      color: #a0a0b0;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .timer-box {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }
    .timer-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #888;
      margin-bottom: 8px;
    }
    #timer {
      font-size: 48px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: #4ecca3;
    }
    .encouragement {
      font-size: 14px;
      color: #a0a0b0;
      margin-top: 24px;
      font-style: italic;
    }
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 32px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🌿</div>
    <h1>Focus Mode Active</h1>
    <p class="message">This site is blocked during your focus session.<br>Stay on task — you've got this!</p>
    <div class="timer-box">
      <div class="timer-label">Time Remaining</div>
      <div id="timer">--:--</div>
    </div>
    <p class="encouragement" id="encouragement">Deep work leads to great results.</p>
    <p class="hint">When your focus session ends, this page will close automatically.</p>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
